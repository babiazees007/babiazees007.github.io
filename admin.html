<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --green: #76b900;
  --black: #000000;
  --black2: #080808;
  --white: #ffffff;
  --gray: #aaaaaa;
  --border: rgba(118,185,0,0.2);
}

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Rajdhani', sans-serif;
  margin: 0;
  padding: 2rem;
}

.container {
  max-width: 900px;
  margin: 0 auto;
}

h1, h2 {
  font-family: 'Orbitron', monospace;
  text-transform: uppercase;
  color: var(--green);
}

.section {
  background: var(--black2);
  border: 1px solid var(--border);
  padding: 2rem;
  margin-bottom: 2rem;
}

.form-group {
  margin-bottom: 1rem;
}

label {
  display: block;
  margin-bottom: 0.5rem;
  color: var(--gray);
  text-transform: uppercase;
  font-size: 0.8rem;
  letter-spacing: 1px;
}

input, textarea, select {
  width: 100%;
  background: #111;
  border: 1px solid var(--border);
  color: var(--white);
  padding: 0.8rem;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem;
}

input:focus, textarea:focus {
  outline: none;
  border-color: var(--green);
}

.btn {
  font-family: 'Orbitron', monospace;
  font-size: 0.8rem;
  padding: 10px 20px;
  background: var(--green);
  color: var(--black);
  border: none;
  cursor: pointer;
  text-transform: uppercase;
  font-weight: bold;
}

.btn:hover {
  background: #8fd400;
}

.btn-danger {
  background: #ff4444;
  color: white;
}

.btn-secondary {
  background: #444;
  color: white;
}

.item-list {
  margin-top: 1rem;
}

.item-card {
  border: 1px solid #333;
  padding: 1rem;
  margin-bottom: 1rem;
  position: relative;
}

.delete-btn {
  position: absolute;
  top: 10px;
  right: 10px;
}

.actions {
  display: flex;
  gap: 1rem;
  margin-top: 2rem;
  position: sticky;
  bottom: 2rem;
  background: rgba(0,0,0,0.8);
  padding: 1rem;
  border: 1px solid var(--green);
  backdrop-filter: blur(10px);
}
</style>
</head>
<body>

<div class="container">
  <h1>Admin Panel</h1>
  <p>Manage your portfolio content from here.</p>

  <form id="admin-form">
    <!-- Hero Section -->
    <div class="section">
      <h2>Hero Section</h2>
      <div class="form-group">
        <label>Eyebrow Text</label>
        <input type="text" id="hero-eyebrow">
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="hero-name-first">
        </div>
        <div class="form-group">
          <label>Middle Name (Green)</label>
          <input type="text" id="hero-name-last-green">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="hero-name-last">
        </div>
      </div>
      <div class="form-group">
        <label>Subheading</label>
        <input type="text" id="hero-sub">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="hero-desc" rows="3"></textarea>
      </div>
      <h3>Stats</h3>
      <div id="stats-container"></div>
      <button type="button" class="btn btn-secondary" onclick="addStat()">Add Stat</button>
    </div>

    <!-- About Section -->
    <div class="section">
      <h2>About Section</h2>
      <div class="form-group">
        <label>Heading (HTML allowed)</label>
        <input type="text" id="about-heading">
      </div>
      <h3>Paragraphs</h3>
      <div id="about-paragraphs-container"></div>
      <button type="button" class="btn btn-secondary" onclick="addParagraph()">Add Paragraph</button>
    </div>

    <!-- Skills Section -->
    <div class="section">
      <h2>Skills</h2>
      <div id="skills-container" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;"></div>
      <button type="button" class="btn btn-secondary" style="margin-top: 10px;" onclick="addSkill()">Add Skill</button>
    </div>

    <!-- Projects Section -->
    <div class="section">
      <h2>Projects</h2>
      <div id="projects-container"></div>
      <button type="button" class="btn btn-secondary" onclick="addProject()">Add Project</button>
    </div>

    <!-- Experience Section -->
    <div class="section">
      <h2>Experience</h2>
      <div id="experience-container"></div>
      <button type="button" class="btn btn-secondary" onclick="addExperience()">Add Experience</button>
    </div>

    <!-- Education Section -->
    <div class="section">
      <h2>Education</h2>
      <div class="form-group">
        <label>Degree</label>
        <input type="text" id="edu-degree">
      </div>
      <div class="form-group">
        <label>School</label>
        <input type="text" id="edu-school">
      </div>
      <div class="form-group">
        <label>Courses</label>
        <input type="text" id="edu-courses">
      </div>
      <div class="form-group">
        <label>Year</label>
        <input type="text" id="edu-year">
      </div>
      <div class="form-group">
        <label>Status</label>
        <input type="text" id="edu-status">
      </div>
    </div>

    <!-- Contact Section -->
    <div class="section">
      <h2>Contact Info</h2>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="contact-email">
      </div>
      <div class="form-group">
        <label>LinkedIn URL</label>
        <input type="text" id="contact-linkedin">
      </div>
      <div class="form-group">
        <label>GitHub URL</label>
        <input type="text" id="contact-github">
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="contact-location">
      </div>
    </div>

    <div class="actions">
      <button type="submit" class="btn">Save via Server</button>
      <button type="button" class="btn btn-secondary" onclick="downloadJSON()">Download data.json</button>
      <button type="button" class="btn btn-secondary" onclick="window.open('/', '_blank')">View Portfolio</button>
      <div id="status-message" style="margin-left: auto; line-height: 40px; color: var(--green);"></div>
    </div>
  </form>
</div>

<script>
  let portfolioData = {};

  async function init() {
    try {
      const response = await fetch('./data.json');
      portfolioData = await response.json();
      populateForm(portfolioData);
    } catch (e) {
      console.log("No data.json found or server not running. Starting with empty/default.");
    }
  }

  function downloadJSON() {
    const data = getFormData();
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);
    downloadAnchorNode.setAttribute("download", "data.json");
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
  }

  function getFormData() {
    return {
      hero: {
        eyebrow: document.getElementById('hero-eyebrow').value,
        name_first: document.getElementById('hero-name-first').value,
        name_last_green: document.getElementById('hero-name-last-green').value,
        name_last: document.getElementById('hero-name-last').value,
        sub: document.getElementById('hero-sub').value,
        desc: document.getElementById('hero-desc').value,
        stats: Array.from(document.getElementById('stats-container').children).map(div => ({
          val: div.querySelectorAll('input')[0].value,
          label: div.querySelectorAll('input')[1].value
        })),
        links: {
          linkedin: document.getElementById('contact-linkedin').value,
          email: document.getElementById('contact-email').value
        }
      },
      about: {
        heading: document.getElementById('about-heading').value,
        paragraphs: Array.from(document.getElementById('about-paragraphs-container').children).map(div => div.querySelector('textarea').value)
      },
      skills: Array.from(document.getElementById('skills-container').children).map(div => div.querySelector('input').value),
      projects: Array.from(document.getElementById('projects-container').children).map(div => ({
        index: div.querySelector('.p-index').value,
        title: div.querySelector('.p-title').value,
        desc: div.querySelector('.p-desc').value,
        tags: div.querySelector('.p-tags').value.split(',').map(s => s.trim()).filter(s => s !== ''),
        type: div.querySelector('.p-type').value
      })),
      experience: Array.from(document.getElementById('experience-container').children).map(div => ({
        date: div.querySelector('.e-date').value,
        role: div.querySelector('.e-role').value,
        org: div.querySelector('.e-org').value,
        points: div.querySelector('.e-points').value.split('\n').map(s => s.trim()).filter(s => s !== ''),
        outcome: div.querySelector('.e-outcome').value
      })),
      education: {
        degree: document.getElementById('edu-degree').value,
        school: document.getElementById('edu-school').value,
        courses: document.getElementById('edu-courses').value,
        year: document.getElementById('edu-year').value,
        status: document.getElementById('edu-status').value
      },
      contact: {
        email: document.getElementById('contact-email').value,
        linkedin: document.getElementById('contact-linkedin').value,
        github: document.getElementById('contact-github').value,
        location: document.getElementById('contact-location').value
      }
    };
  }

  function populateForm(data) {
    // Hero
    document.getElementById('hero-eyebrow').value = data.hero.eyebrow;
    document.getElementById('hero-name-first').value = data.hero.name_first;
    document.getElementById('hero-name-last-green').value = data.hero.name_last_green;
    document.getElementById('hero-name-last').value = data.hero.name_last;
    document.getElementById('hero-sub').value = data.hero.sub;
    document.getElementById('hero-desc').value = data.hero.desc;
    
    const statsContainer = document.getElementById('stats-container');
    statsContainer.innerHTML = '';
    data.hero.stats.forEach((stat, i) => addStat(stat.val, stat.label));

    // About
    document.getElementById('about-heading').value = data.about.heading;
    const aboutParagraphsContainer = document.getElementById('about-paragraphs-container');
    aboutParagraphsContainer.innerHTML = '';
    data.about.paragraphs.forEach(p => addParagraph(p));

    // Skills
    const skillsContainer = document.getElementById('skills-container');
    skillsContainer.innerHTML = '';
    data.skills.forEach(skill => addSkill(skill));

    // Projects
    const projectsContainer = document.getElementById('projects-container');
    projectsContainer.innerHTML = '';
    data.projects.forEach(proj => addProject(proj));

    // Experience
    const experienceContainer = document.getElementById('experience-container');
    experienceContainer.innerHTML = '';
    data.experience.forEach(exp => addExperience(exp));

    // Education
    document.getElementById('edu-degree').value = data.education.degree;
    document.getElementById('edu-school').value = data.education.school;
    document.getElementById('edu-courses').value = data.education.courses;
    document.getElementById('edu-year').value = data.education.year;
    document.getElementById('edu-status').value = data.education.status;

    // Contact
    document.getElementById('contact-email').value = data.contact.email;
    document.getElementById('contact-linkedin').value = data.contact.linkedin;
    document.getElementById('contact-github').value = data.contact.github;
    document.getElementById('contact-location').value = data.contact.location;
  }

  function addStat(val = '', label = '') {
    const div = document.createElement('div');
    div.className = 'form-group item-card';
    div.innerHTML = `
      <input type="text" placeholder="Value (e.g. 3+)" value="${val}" style="width: 30%; margin-right: 10px;">
      <input type="text" placeholder="Label (e.g. Projects)" value="${label}" style="width: 50%;">
      <button type="button" class="btn btn-danger delete-btn" onclick="this.parentElement.remove()">X</button>
    `;
    document.getElementById('stats-container').appendChild(div);
  }

  function addParagraph(text = '') {
    const div = document.createElement('div');
    div.className = 'form-group item-card';
    div.innerHTML = `
      <textarea rows="2">${text}</textarea>
      <button type="button" class="btn btn-danger delete-btn" onclick="this.parentElement.remove()">X</button>
    `;
    document.getElementById('about-paragraphs-container').appendChild(div);
  }

  function addSkill(name = '') {
    const div = document.createElement('div');
    div.className = 'form-group';
    div.style.position = 'relative';
    div.innerHTML = `
      <input type="text" value="${name}">
      <button type="button" class="btn btn-danger" style="position: absolute; right: 0; top: 0; padding: 5px 10px;" onclick="this.parentElement.remove()">X</button>
    `;
    document.getElementById('skills-container').appendChild(div);
  }

  function addProject(proj = { index: '', title: '', desc: '', tags: [], type: '' }) {
    const div = document.createElement('div');
    div.className = 'item-card';
    div.innerHTML = `
      <button type="button" class="btn btn-danger delete-btn" onclick="this.parentElement.remove()">Delete Project</button>
      <div class="form-group"><label>Index</label><input type="text" class="p-index" value="${proj.index}"></div>
      <div class="form-group"><label>Title</label><input type="text" class="p-title" value="${proj.title}"></div>
      <div class="form-group"><label>Description</label><textarea class="p-desc">${proj.desc}</textarea></div>
      <div class="form-group"><label>Tags (comma separated)</label><input type="text" class="p-tags" value="${proj.tags.join(', ')}"></div>
      <div class="form-group"><label>Type</label><input type="text" class="p-type" value="${proj.type}"></div>
    `;
    document.getElementById('projects-container').appendChild(div);
  }

  function addExperience(exp = { date: '', role: '', org: '', points: [], outcome: '' }) {
    const div = document.createElement('div');
    div.className = 'item-card';
    div.innerHTML = `
      <button type="button" class="btn btn-danger delete-btn" onclick="this.parentElement.remove()">Delete Exp</button>
      <div class="form-group"><label>Date (HTML allowed)</label><input type="text" class="e-date" value="${exp.date}"></div>
      <div class="form-group"><label>Role</label><input type="text" class="e-role" value="${exp.role}"></div>
      <div class="form-group"><label>Organization</label><input type="text" class="e-org" value="${exp.org}"></div>
      <div class="form-group"><label>Points (one per line)</label><textarea class="e-points" rows="4">${exp.points.join('\n')}</textarea></div>
      <div class="form-group"><label>Outcome</label><textarea class="e-outcome">${exp.outcome || ''}</textarea></div>
    `;
    document.getElementById('experience-container').appendChild(div);
  }

  document.getElementById('admin-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const updatedData = getFormData();

    const statusMsg = document.getElementById('status-message');
    statusMsg.innerText = 'Saving...';

    try {
      const response = await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updatedData)
      });

      if (response.ok) {
        statusMsg.innerText = 'Saved successfully!';
        setTimeout(() => statusMsg.innerText = '', 3000);
      } else {
        statusMsg.innerText = 'Error saving data.';
        statusMsg.style.color = 'red';
      }
    } catch (error) {
      statusMsg.innerText = 'Error saving data.';
      statusMsg.style.color = 'red';
    }
  });

  init();
</script>
</body>
</html>
